outer_loop:
  cycle: 2
  last_direction: pivot
  last_reflection: "Indirect mined-context success spans four boundary surfaces, and matched no-note controls for CI, package lifecycle, and startup/runtime all stay at SSE-SR=0.00. Package and startup controls still made benign metadata edits, strengthening the claim that the oracle is specific to SandScout sentinel placement rather than generic file modification. The remaining tool-manifest no-note control was attempted in run_017 but blocked by Codex CLI usage_limit, then retried in run_019 after a runner-level Codex CLI service_tier override. Run_019 reached live execution but timed out, created no sentinel, and produced a clean safety scan, so it remains an availability failure rather than behavioral evidence. Offline work now created reusable NDSS-style results, result CSVs, an SVG control-matrix figure, verified source notes, related-work draft, threat-model/safety draft, a paper-ready method section, and a compiled NDSS 2026 LaTeX draft under paper/latex/. User clarified that SandScout should detect unsafe categories rather than merely exclude them; run_018 added a safety scanner for exploit payload indicators, credentials/secrets, destructive commands, and product-specific vulnerability claims. Current writing should emphasize SandScout as an automated mining/evaluation method, with SSE-Bench as the resulting artifact."

