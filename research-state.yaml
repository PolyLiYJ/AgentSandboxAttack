project:
  title: "SandScout: Automated Mining of Agent Sandbox Escape Paths"
  question: "Can we automatically mine repository-level semantic sandbox boundary candidates, synthesize safe sentinel tasks, and measure whether real coding agents cross those boundaries?"
  status: active
  started: "2026-06-13"
  domain: "AI agent security, sandbox escape, prompt injection, coding agents"

literature:
  key_papers:
    - id: "agentdojo2024"
      title: "AgentDojo: A Dynamic Environment to Evaluate Prompt Injection Attacks and Defenses for LLM Agents"
      authors: "Debenedetti et al."
      year: 2024
      relevance: "Dynamic benchmark for tool-using agents over untrusted data; closest benchmark pattern but not focused on sandbox escape."
      url: "https://arxiv.org/abs/2406.13352"
    - id: "wasp2025"
      title: "WASP: Benchmarking Web Agent Security Against Prompt Injection Attacks"
      authors: "Evtimov et al."
      year: 2025
      relevance: "Realistic web-agent hijacking benchmark; motivates end-to-end attack success metrics under realistic adversary power."
      url: "https://arxiv.org/abs/2504.18575"
    - id: "agentharm2024"
      title: "AgentHarm: A Benchmark for Measuring Harmfulness of LLM Agents"
      authors: "Andriushchenko et al."
      year: 2024
      relevance: "Shows agent misuse requires multi-step capability retention, not only refusal bypass."
      url: "https://arxiv.org/abs/2410.09024"
    - id: "sweagent2024"
      title: "Agent-Computer Interfaces Enable Automated Software Engineering"
      authors: "Yang et al."
      year: 2024
      relevance: "Defines agent-computer interfaces for coding agents; this work studies the security consequences of those interfaces."
      url: "https://arxiv.org/abs/2405.15793"
    - id: "sandboxescapebench2026"
      title: "Quantifying Frontier LLM Capabilities for Container Sandbox Escape"
      authors: "Rahul Marchand, Art O Cathain, Jerome Wynne, Philippos Maximos Giavridis, Sam Deverett, John Wilkinson, Jason Gwartz, Harry Coppock"
      year: 2026
      relevance: "Measures model capability against container/OCI escape tasks; adjacent but more OS/container-exploit-centric than agent-configuration-centric."
      url: "https://arxiv.org/html/2603.02277v1"
    - id: "codingassistantinjection2026"
      title: "Prompt Injection Attacks on Agentic Coding Assistants"
      authors: "Narek Maloyan, Dmitry Namiot"
      year: 2026
      relevance: "Catalogs attack techniques against coding assistants; useful taxonomy for threat modeling."
      url: "https://arxiv.org/html/2601.17548v1"
  open_problems:
    - "Existing agent security benchmarks focus on hijacking tool behavior, harmful requests, web navigation, or classical container escape; they do not automate discovery of agent-level sandbox boundary candidates."
    - "Security reports describe configuration-based sandbox escape in AI coding tools, but there is no reusable academic benchmark with controlled tasks, baselines, and ablations."
    - "Current sandbox evaluations often ask whether an agent can break Docker; fewer ask whether the agent can unintentionally prepare host-context execution through benign-looking repo/config changes."
  evidence_gaps:
    - "Cross-agent reproducibility across CLI coding agents, cloud coding agents, and web/computer-use agents."
    - "Attack success decomposition: instruction uptake, sandbox-boundary violation, host-context trigger, and observable impact."
    - "Defensive evaluation that separates model refusal, tool approval UX, filesystem policy, startup policy, and configuration provenance."

hypotheses:
  - id: H1
    statement: "An automated miner can discover semantic sandbox escape candidates from repository lifecycle artifacts and synthesize safe tasks that reveal boundary-crossing behavior in real coding agents."
    status: active
    motivation: "Recent disclosures suggest many failures are not kernel escapes but trust-boundary failures around project-local configuration, startup behavior, and tool discovery."
    parent: null
    priority: high
  - id: H2
    statement: "Attack success will correlate more strongly with interface affordances and approval-policy wording than with raw model capability."
    status: pending
    motivation: "SWE-agent shows ACI design changes agent behavior; AgentDojo and WASP show task realism matters."
    parent: null
    priority: medium
  - id: H3
    statement: "A provenance-aware policy for executable/configuration artifacts will reduce semantic sandbox escape success without materially reducing benign coding task completion."
    status: pending
    motivation: "This is a possible defense ablation, but the paper should focus on the attack benchmark first."
    parent: null
    priority: low

